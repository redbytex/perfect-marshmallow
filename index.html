<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ROAST</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #050810;
    font-family: 'JetBrains Mono', monospace;
    color: #f4e4c1;
    touch-action: none;
    overscroll-behavior: none;
  }
  #game { position: fixed; inset: 0; }
  canvas { display: block; }

  .fire-glow {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    height: 45%;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(ellipse 60% 100% at 50% 110%,
      rgba(255, 110, 30, 0.55) 0%,
      rgba(255, 60, 10, 0.35) 25%,
      rgba(180, 30, 0, 0.15) 50%,
      transparent 80%);
    mix-blend-mode: screen;
    will-change: opacity, transform;
  }
  .fire-glow.inner {
    background: radial-gradient(ellipse 30% 70% at 50% 115%,
      rgba(255, 200, 100, 0.7) 0%,
      rgba(255, 130, 30, 0.4) 30%,
      transparent 70%);
    mix-blend-mode: screen;
  }

  #score-readout {
    top: max(28px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }
  .score-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 4px;
  }
  .score-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1;
    color: #f4e4c1;
    transition: color 0.3s;
  }
  .score-value.danger { color: #ff8a3d; }

  .controls-bottom {
    position: fixed;
    bottom: max(40px, env(safe-area-inset-bottom));
    z-index: 20;
    pointer-events: none;
  }
  #joystick-zone {
    left: max(28px, env(safe-area-inset-left));
    width: 130px;
    height: 130px;
  }
  /* Rotate buttons now horizontal, L then R */
  #rotate-zone {
    right: max(28px, env(safe-area-inset-right));
    display: flex;
    flex-direction: row;
    gap: 14px;
    align-items: center;
  }
  .control-base {
    border-radius: 50%;
    border: 1px solid rgba(244, 228, 193, 0.22);
    background: rgba(244, 228, 193, 0.04);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    pointer-events: auto;
    touch-action: none;
    transition: all 0.1s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f4e4c1;
  }
  #joystick-base { width: 100%; height: 100%; }
  #joystick-stick {
    position: absolute;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(244, 228, 193, 0.7);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease-out;
    pointer-events: none;
    box-shadow: 0 0 18px rgba(244, 228, 193, 0.3);
  }

  .rotate-btn {
    width: 76px;
    height: 76px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: rgba(244, 228, 193, 0.7);
  }
  .rotate-btn .arrow {
    font-size: 22px;
    margin-right: 4px;
    opacity: 0.85;
  }
  .rotate-btn.active {
    background: rgba(244, 228, 193, 0.16);
    border-color: rgba(244, 228, 193, 0.7);
    color: #f4e4c1;
    box-shadow: 0 0 26px rgba(244, 228, 193, 0.18);
  }
  .rotate-btn:active { transform: scale(0.95); }

  .ctl-label {
    position: absolute;
    bottom: -22px; left: 50%; transform: translateX(-50%);
    font-size: 8px; letter-spacing: 0.4em; opacity: 0.4;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #finish-btn {
    position: fixed;
    bottom: max(50px, calc(env(safe-area-inset-bottom) + 20px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    background: rgba(10, 7, 5, 0.7);
    color: rgba(244, 228, 193, 0.85);
    border: 1px solid rgba(244, 228, 193, 0.25);
    padding: 14px 28px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
    pointer-events: auto;
  }
  #finish-btn:hover, #finish-btn:active {
    background: rgba(244, 228, 193, 0.14);
    color: #f4e4c1;
    border-color: rgba(244, 228, 193, 0.6);
    letter-spacing: 0.5em;
  }

  #title-screen {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 16, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
    transition: opacity 0.6s;
  }
  /* End-screen is anchored to the right half so the rotated marshmallow
     stays visible on the left half of the canvas. */
  #end-screen {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 50vw;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
    background: rgba(5, 8, 16, 0);
    transform: translateX(0);
    transition: transform 0.7s cubic-bezier(.4, 0, .2, 1), opacity 0.5s;
  }
  #end-screen.hidden {
    transform: translateX(110%);
    opacity: 0;
    pointer-events: none;
  }
  .screen-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(56px, 13vw, 130px);
    letter-spacing: 0.02em;
    line-height: 0.95;
    background: linear-gradient(180deg, #f4e4c1 0%, #d4a25a 60%, #8a4a1c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    max-width: 90vw;
  }
  .screen-tag {
    font-size: 11px;
    letter-spacing: 0.45em;
    opacity: 0.5;
    text-transform: uppercase;
    margin-bottom: 60px;
  }
  .screen-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2.4vw, 22px);
    font-weight: 300;
    line-height: 1.6;
    max-width: 480px;
    opacity: 0.75;
    margin-bottom: 50px;
    font-style: italic;
  }
  .screen-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    background: transparent;
    color: #f4e4c1;
    border: 1px solid rgba(244, 228, 193, 0.4);
    padding: 18px 48px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .screen-btn:hover, .screen-btn:active {
    background: rgba(244, 228, 193, 0.1);
    border-color: rgba(244, 228, 193, 0.8);
    letter-spacing: 0.5em;
  }
  .hidden { opacity: 0; pointer-events: none; }

  #end-screen { background: rgba(0, 0, 0, 0); backdrop-filter: none; -webkit-backdrop-filter: none; }
  #end-screen .end-card {
    background: transparent;
    padding: 24px;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 100%;
  }
  #end-emoji {
    font-size: clamp(80px, 16vw, 140px);
    line-height: 1;
    margin-bottom: 12px;
  }
  #end-band {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(40px, 8vw, 70px);
    line-height: 1.05;
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    text-align: center;
    max-width: 90vw;
  }
  #end-band.b-perfect { color: #ffd27a; text-shadow: 0 0 60px rgba(255, 210, 122, 0.55); }
  #end-band.b-silver  { color: #d8e0e8; }
  #end-band.b-bronze  { color: #c47a3a; }
  #end-band.b-cool    { color: #8fa6c0; }
  #end-band.b-cold    { color: #6090c0; }
  #end-band.b-burned  { color: #8a4a1c; }
  #end-band.b-yuck    { color: #ff5530; text-shadow: 0 0 50px rgba(255, 85, 48, 0.5); }
  #end-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(120px, 22vw, 200px);
    font-weight: 300;
    line-height: 1;
    color: #f4e4c1;
    margin-bottom: 4px;
  }
  #end-score.fire { color: #ff5530; }
  #end-score.cold { color: #6080a0; }
  .end-stat {
    font-size: 11px;
    letter-spacing: 0.4em;
    opacity: 0.5;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  #end-screen.fire-mode { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(20px); }
  #end-screen.fire-mode .end-card { background: transparent; border: none; }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  #fire-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    pointer-events: auto;
    background: radial-gradient(circle at center, rgba(255, 80, 0, 0.18), rgba(150, 30, 0, 0.35));
    animation: fire-pulse 0.5s ease-in-out infinite alternate;
    transition: opacity 0.3s;
  }
  #fire-overlay.hidden { opacity: 0; pointer-events: none; animation: none; }
  @keyframes fire-pulse {
    from { background: radial-gradient(circle at center, rgba(255, 80, 0, 0.12), rgba(150, 30, 0, 0.3)); }
    to { background: radial-gradient(circle at center, rgba(255, 130, 20, 0.28), rgba(180, 50, 0, 0.5)); }
  }
  #fire-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(80px, 18vw, 180px);
    line-height: 1;
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow:
      0 0 30px rgba(255, 200, 100, 0.9),
      0 0 60px rgba(255, 100, 20, 0.7),
      0 0 100px rgba(255, 60, 0, 0.5);
  }
  #blow-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #fff;
    background: rgba(255, 80, 0, 0.35);
    border: 2px solid rgba(255, 220, 180, 0.85);
    padding: 22px 48px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: all 0.15s;
    box-shadow: 0 0 40px rgba(255, 100, 20, 0.4);
  }
  #blow-btn:active {
    transform: scale(0.95);
    background: rgba(255, 200, 100, 0.55);
    letter-spacing: 0.5em;
  }

  @media (max-width: 600px) {
    #joystick-zone { width: 110px; height: 110px; }
    #joystick-stick { width: 44px; height: 44px; }
    .rotate-btn { width: 64px; height: 64px; font-size: 16px; }
    #rotate-zone { gap: 10px; }
    .score-value { font-size: 48px; }
  }
</style>
</head>
<body>
  <div id="game"></div>
  <div class="fire-glow" id="fire-glow-outer"></div>
  <div class="fire-glow inner" id="fire-glow-inner"></div>
  <div class="grain"></div>

  <div id="score-readout" style="display: none;">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-num">0</div>
  </div>

  <div id="joystick-zone" class="controls-bottom">
    <div id="joystick-base" class="control-base">
      <div id="joystick-stick"></div>
    </div>
    <div class="ctl-label">Move</div>
  </div>

  <div id="rotate-zone" class="controls-bottom">
    <button class="rotate-btn control-base" id="rot-left-btn"><span class="arrow">↺</span>L</button>
    <button class="rotate-btn control-base" id="rot-right-btn"><span class="arrow">↻</span>R</button>
  </div>

  <button id="finish-btn">Finish</button>

  <div id="fire-overlay" class="hidden">
    <div id="fire-title">FIRE!</div>
    <button id="blow-btn">BLOW IT OUT</button>
  </div>

  <div id="title-screen">
    <div class="screen-title">The Perfect Roast</div>
    <button class="screen-btn" id="start-btn" style="margin-top: 60px;">Begin</button>
  </div>

  <div id="end-screen" class="hidden">
    <div class="end-card">
      <div class="screen-tag" id="end-result-label">Round Complete</div>
      <div id="end-emoji">🥇</div>
      <div id="end-band">Perfect</div>
      <div id="end-score">105</div>
      <div class="end-stat" id="end-stat">Average across surface</div>
      <button class="screen-btn" id="restart-btn">Try Again</button>
    </div>
  </div>

<script type="importmap">

  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
  }

// ============================================================
// FIRE PARTICLE SYSTEM (Sprite-based for cross-platform compat)
// iOS Safari has known issues with THREE.Points + gl_PointCoord that produce
// glitchy squares. Sprites use textured quads with proper UVs and work everywhere.
// ============================================================
const FIRE_PARTICLE_MAX = 60;

// Build a soft radial gradient texture for the flame puffs
const fireParticleTexture = (() => {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0,    'rgba(255, 255, 240, 1.0)');
  g.addColorStop(0.25, 'rgba(255, 220, 140, 0.8)');
  g.addColorStop(0.55, 'rgba(255, 130, 40, 0.35)');
  g.addColorStop(1.0,  'rgba(255, 80, 10, 0.0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
})();

// Pool of Sprite objects — one per particle slot
const fireSprites = [];
const fireParticleState = [];
for (let i = 0; i < FIRE_PARTICLE_MAX; i++) {
  const mat = new THREE.SpriteMaterial({
    map: fireParticleTexture,
    color: 0xffffff,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0, 0, 0);
  sprite.visible = false;
  scene.add(sprite);
  fireSprites.push(sprite);
  fireParticleState.push({ alive: false, life: 0, maxLife: 1, vx: 0, vy: 0, vz: 0, baseScale: 0 });
}

function spawnFireParticle(x, y, z) {
  for (let i = 0; i < FIRE_PARTICLE_MAX; i++) {
    const p = fireParticleState[i];
    if (!p.alive) {
      p.alive = true;
      p.life = 0;
      p.maxLife = 0.6 + Math.random() * 0.5;
      p.vx = (Math.random() - 0.5) * 0.4;
      p.vy = 0.8 + Math.random() * 0.6;
      p.vz = (Math.random() - 0.5) * 0.4;
      p.baseScale = 0.5 + Math.random() * 0.3;

      const sprite = fireSprites[i];
      sprite.position.set(
        x + (Math.random() - 0.5) * 0.05,
        y + (Math.random() - 0.5) * 0.05,
        z + (Math.random() - 0.5) * 0.05
      );
      sprite.scale.set(p.baseScale, p.baseScale, 1);
      sprite.material.color.setRGB(1.0, 0.7, 0.2);
      sprite.material.opacity = 1.0;
      sprite.visible = true;
      return;
    }
  }
}

function updateFireParticles(dt) {
  let anyAlive = false;
  for (let i = 0; i < FIRE_PARTICLE_MAX; i++) {
    const p = fireParticleState[i];
    if (!p.alive) continue;
    anyAlive = true;
    p.life += dt;
    const sprite = fireSprites[i];

    if (p.life >= p.maxLife) {
      p.alive = false;
      sprite.visible = false;
      sprite.scale.set(0, 0, 0);
      continue;
    }

    const t = p.life / p.maxLife;
    // Move
    sprite.position.x += p.vx * dt;
    sprite.position.y += p.vy * dt;
    sprite.position.z += p.vz * dt;
    // Drag on vertical velocity
    p.vy *= 0.98;
    // Color shift: bright yellow → red-orange → dim red
    sprite.material.color.setRGB(
      1.0,
      0.7 * (1 - t * 0.7),
      0.2 * (1 - t)
    );
    // Fade out alpha as it ages, sharpest in last third of life
    sprite.material.opacity = 1.0 - t * t;
    // Size grows slightly then shrinks
    const sizeT = Math.sin(t * Math.PI);   // bell curve, 0 → 1 → 0
    const s = p.baseScale * (0.6 + 0.6 * sizeT);
    sprite.scale.set(s, s, 1);
  }
  return anyAlive;
}

function clearFireParticles() {
  for (let i = 0; i < FIRE_PARTICLE_MAX; i++) {
    fireParticleState[i].alive = false;
    fireSprites[i].visible = false;
    fireSprites[i].scale.set(0, 0, 0);
  }
}


// ============================================================
// MARSHMALLOW from imported USD mesh
// ============================================================
function createMarshmallowGeom() {
  const data = MESH_DATA.marshmallow;
  const positions = new Float32Array(data.positions);
  const indices = new Uint32Array(data.indices);

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  g.setIndex(new THREE.BufferAttribute(indices, 1));
  g.computeVertexNormals();   // smooth normals across the whole mesh

  // Compute per-vertex 'cookable' mask. A vertex is cookable (curved circumference)
  // if its normal is mostly perpendicular to the skewer's long axis (Y in this frame).
  // Cap vertices have normals pointing along Y, so |ny| ~ 1 → not cookable.
  const normAttr = g.attributes.normal;
  const vCount = positions.length / 3;
  const cookable = new Float32Array(vCount);
  for (let i = 0; i < vCount; i++) {
    const ny = Math.abs(normAttr.getY(i));
    cookable[i] = ny < 0.6 ? 1.0 : 0.0;
  }
  g.setAttribute('cookable', new THREE.BufferAttribute(cookable, 1));

  return g;
}

function createSkewerGeom() {
  const data = MESH_DATA.skewer;
  const positions = new Float32Array(data.positions);
  const indices = new Uint32Array(data.indices);

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  g.setIndex(new THREE.BufferAttribute(indices, 1));
  g.computeVertexNormals();
  return g;
}

// ============================================================
// SHADER
// ============================================================
const marshVertexShader = `
  attribute float doneness;
  attribute float cookable;
  varying float vDoneness;
  varying float vCookable;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vLocalPos;
  varying vec3 vViewPos;
  void main() {
    vDoneness = doneness;
    vCookable = cookable;
    vNormal = normalize(normalMatrix * normal);
    vLocalPos = position;
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vec4 viewPos = viewMatrix * worldPos;
    vViewPos = viewPos.xyz;
    gl_Position = projectionMatrix * viewPos;
  }
`;

const marshFragmentShader = `
  precision highp float;
  varying float vDoneness;
  varying float vCookable;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vLocalPos;
  varying vec3 vViewPos;
  uniform vec3 uFlamePos;
  uniform float uTime;

  float hash(vec3 p) {
    p = fract(p * vec3(443.897, 441.423, 437.195));
    p += dot(p, p.yzx + 19.19);
    return fract((p.x + p.y) * p.z);
  }
  float noise(vec3 p) {
    vec3 i = floor(p);
    vec3 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
          mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
      mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
          mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
      f.z
    );
  }
  float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 4; i++) {
      v += a * noise(p);
      p *= 2.0;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    vec3 baseColor = vec3(0.94, 0.90, 0.84);
    float surfaceN = fbm(vLocalPos * 24.0) * 0.06;
    baseColor *= (1.0 - surfaceN);

    float dEffective = mix(0.0, vDoneness, vCookable);

    float brownAmount = clamp(dEffective / 100.0, 0.0, 1.6);
    float pattern = fbm(vLocalPos * 35.0 + vec3(0.5));
    float pattern2 = fbm(vLocalPos * 95.0 + vec3(2.7));
    float speckle = pattern * 0.7 + pattern2 * 0.3;
    speckle = smoothstep(0.35 - brownAmount * 0.25, 0.65 + brownAmount * 0.05, speckle);

    vec3 lightBrown = vec3(0.62, 0.40, 0.18);
    vec3 deepBrown  = vec3(0.28, 0.14, 0.06);
    vec3 charBrown  = vec3(0.05, 0.025, 0.015);
    vec3 brownTint;
    if (dEffective < 100.0) {
      brownTint = mix(baseColor, lightBrown, smoothstep(0.0, 100.0, dEffective));
    } else if (dEffective < 130.0) {
      brownTint = mix(lightBrown, deepBrown, (dEffective - 100.0) / 30.0);
    } else {
      brownTint = mix(deepBrown, charBrown, clamp((dEffective - 130.0) / 25.0, 0.0, 1.0));
    }
    float speckleStrength = clamp(brownAmount * 0.85, 0.0, 1.0);
    vec3 surfaceColor = mix(baseColor, brownTint, speckle * speckleStrength);
    if (dEffective > 80.0) {
      float overall = smoothstep(80.0, 160.0, dEffective) * 0.55;
      surfaceColor = mix(surfaceColor, deepBrown, overall);
    }

    if (dEffective > 100.0 && vCookable > 0.5) {
      float burnAmount = smoothstep(100.0, 150.0, dEffective);
      // FBM noise pattern instead of voronoi — soft organic dark blotches
      float burn = fbm(vLocalPos * 22.0 + vec3(7.3, 1.1, 4.2));
      // Threshold widens as burnAmount grows (more area becomes burnt)
      float burnThreshold = mix(0.62, 0.30, burnAmount);
      float burnMask = smoothstep(burnThreshold, burnThreshold + 0.12, burn);
      // Darkness intensifies — early burns are subtle dark patches, late ones are pure black
      float burnDarkness = mix(0.45, 0.95, burnAmount);
      surfaceColor *= (1.0 - burnMask * burnDarkness);
    }

    vec3 N = normalize(vNormal);
    vec3 topDir = normalize(vec3(0.2, 1.0, 0.3));
    float topDot = max(dot(N, topDir), 0.0);
    vec3 topLightCol = vec3(0.38, 0.48, 0.62) * topDot * 0.7;

    vec3 bottomDir = normalize(vec3(0.0, -1.0, 0.2));
    float bottomDot = max(dot(N, bottomDir), 0.0);
    vec3 bottomLightCol = vec3(1.0, 0.42, 0.08) * bottomDot * 1.8;

    // Distance-based warm glow falloff from the flame source
    float flameDist = distance(vWorldPos, uFlamePos);
    float flameProx = 1.0 / (1.0 + flameDist * flameDist * 0.4);
    bottomLightCol += vec3(1.0, 0.45, 0.12) * flameProx * 0.8;

    vec3 ambientCol = vec3(0.12, 0.16, 0.22);
    vec3 V = normalize(-vViewPos);
    float rim = pow(1.0 - max(dot(N, V), 0.0), 2.5);
    vec3 rimLightCol = vec3(0.5, 0.3, 0.15) * rim * 0.4;

    vec3 color = surfaceColor * (ambientCol + topLightCol + bottomLightCol) + rimLightCol;

    gl_FragColor = vec4(color, 1.0);
  }
`;

// ============================================================
// SKEWER + MARSHMALLOW
// In the new POV, the marshmallow sits at world (0, 1.5, 0) at rest.
// The skewer extends from us (camera at -Z direction relative to mallow)
// toward the marshmallow, then through it. So the skewer is roughly aligned
// with the camera's forward axis but the marshmallow's long axis is perpendicular
// to camera forward — giving us a side-on view of the cylinder.
//
// Wait — the USD has the skewer along Y axis (Blender). But that means the skewer
// runs along the LONG AXIS of the marshmallow, which we already do (X axis here).
// Looking at the camera setup: camera looks from below-front toward the marshmallow.
// The marshmallow's long axis runs left-right across the screen. The skewer goes
// through that axis (so the skewer is also left-right across the screen, with the
// player holding the right side, say).
//
// Actually no — if the camera is BEHIND and BELOW the marshmallow looking up at it,
// and the skewer goes through the marshmallow's long axis... where does the skewer's
// "held" end go? In real life it goes back to the player's hands.
// So the skewer should extend from the marshmallow back TOWARD the camera, then
// disappear off-frame to one side (where the hand would be).
//
// That means the marshmallow's long axis isn't perpendicular to camera view —
// it's actually angled, with the far end up away from camera and the near end
// down toward the player.
//
// But the USD I inspected showed the cylinder rotated 90 about X, making it horizontal
// in world space. With camera also looking up... the long axis would be horizontal
// across our view.
//
// Let me just place the skewer extending from the marshmallow back toward the
// bottom-right of the screen (player's right hand). That gives the natural feel
// of "I'm holding a skewer, the marshmallow is at the far end."
// ============================================================
// Marshmallow + skewer assembly using imported USD meshes.
// In imported frame: skewer's held end is at Y=0, far end at Y=-3.666.
// Marshmallow is centered around origin with long axis along Y.
// We flip on X (rotation.x = π) so:
//   - Skewer's far end ends up in +Y (extends UP out of frame)
//   - Marshmallow stays centered at origin
//   - Camera looks up at this from below
const marshGroup = new THREE.Group();
marshGroup.position.set(0, 1.5, 0);
marshGroup.rotation.x = -Math.PI / 2;       // -90° on X axis
scene.add(marshGroup);

const skewerMat = new THREE.MeshStandardMaterial({ color: 0x3a2515, roughness: 0.85, metalness: 0 });
const skewerMesh = new THREE.Mesh(createSkewerGeom(), skewerMat);
marshGroup.add(skewerMesh);

// Marshmallow holder rotates around the skewer's long axis (Y in imported frame)
const marshHolder = new THREE.Group();
marshGroup.add(marshHolder);

let marshmallow = null;
let marshGeom = null;
let donenessAttr = null;
let cookableArr = null;
let igniteThresholds = null;   // per-vertex re-ignition threshold (starts at IGNITE)
let vertexCount = 0;

function buildMarshmallow() {
  if (marshmallow) {
    marshHolder.remove(marshmallow);
    marshGeom.dispose();
    marshmallow.material.dispose();
  }
  marshGeom = createMarshmallowGeom();
  vertexCount = marshGeom.attributes.position.count;
  cookableArr = marshGeom.attributes.cookable.array;

  const doneness = new Float32Array(vertexCount);
  donenessAttr = new THREE.BufferAttribute(doneness, 1);
  donenessAttr.setUsage(THREE.DynamicDrawUsage);
  marshGeom.setAttribute('doneness', donenessAttr);

  // Per-vertex ignite thresholds — start at base IGNITE for all
  igniteThresholds = new Float32Array(vertexCount);
  for (let i = 0; i < vertexCount; i++) igniteThresholds[i] = CONFIG.IGNITE;

  const mat = new THREE.ShaderMaterial({
    vertexShader: marshVertexShader,
    fragmentShader: marshFragmentShader,
    uniforms: {
      uFlamePos: { value: FLAME_POS.clone() },
      uTime: { value: 0 },
    },
  });
  marshmallow = new THREE.Mesh(marshGeom, mat);
  marshHolder.add(marshmallow);
  marshmallow.rotation.set(0, 0, 0);
}

// ============================================================
// CONTROLS
// ============================================================
const input = {
  joy: { x: 0, y: 0 },
  rotate: 0,
};

(function setupJoystick() {
  const zone = document.getElementById('joystick-zone');
  const base = document.getElementById('joystick-base');
  const stick = document.getElementById('joystick-stick');
  let active = false;
  let centerX = 0, centerY = 0;
  let radius = 50;
  function start(x, y) {
    active = true;
    const rect = base.getBoundingClientRect();
    centerX = rect.left + rect.width / 2;
    centerY = rect.top + rect.height / 2;
    radius = rect.width / 2 - 26;
    update(x, y);
  }
  function update(x, y) {
    if (!active) return;
    let dx = x - centerX, dy = y - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > radius) { dx = dx / dist * radius; dy = dy / dist * radius; }
    stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    input.joy.x = dx / radius;
    input.joy.y = dy / radius;
  }
  function end() {
    active = false;
    stick.style.transform = 'translate(-50%, -50%)';
    input.joy.x = 0; input.joy.y = 0;
  }
  zone.addEventListener('pointerdown', e => { e.preventDefault(); zone.setPointerCapture(e.pointerId); start(e.clientX, e.clientY); });
  zone.addEventListener('pointermove', e => { if (active) update(e.clientX, e.clientY); });
  zone.addEventListener('pointerup', end);
  zone.addEventListener('pointercancel', end);
})();

(function setupRotate() {
  const leftBtn = document.getElementById('rot-left-btn');
  const rightBtn = document.getElementById('rot-right-btn');

  let leftHeld = false, rightHeld = false;
  let lastPressed = 0;

  function applyState() {
    let dir = 0;
    if (leftHeld && rightHeld) dir = lastPressed;
    else if (leftHeld) dir = -1;
    else if (rightHeld) dir = 1;
    input.rotate = dir;
    leftBtn.classList.toggle('active', dir === -1);
    rightBtn.classList.toggle('active', dir === 1);
  }

  function bindHold(btn, dir, setHeld) {
    const press = e => {
      e.preventDefault();
      btn.setPointerCapture(e.pointerId);
      setHeld(true);
      lastPressed = dir;
      applyState();
    };
    const release = () => { setHeld(false); applyState(); };
    btn.addEventListener('pointerdown', press);
    btn.addEventListener('pointerup', release);
    btn.addEventListener('pointercancel', release);
    btn.addEventListener('pointerleave', e => { if (e.buttons === 0) release(); });
  }
  bindHold(leftBtn, -1, v => leftHeld = v);
  bindHold(rightBtn, 1, v => rightHeld = v);

  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.code === 'ArrowLeft') { leftHeld = true; lastPressed = -1; applyState(); }
    if (e.code === 'ArrowRight') { rightHeld = true; lastPressed = 1; applyState(); }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') { leftHeld = false; applyState(); }
    if (e.code === 'ArrowRight') { rightHeld = false; applyState(); }
  });
})();

// ============================================================
// GAME STATE
// ============================================================
const state = {
  phase: 'title',
  spinAngle: 0,
  posX: 0, posY: 0,
  igniteTime: 0,
  revealTime: 0,
  finalScore: 0,
  finalBand: '',
  lastTime: 0,
};

const $ = id => document.getElementById(id);

// Marshmallow's REST position (when joystick is centered)
const REST_Y = 1.5;
const REST_X = 0;
const REST_Z = 0.5;

function startGame() {
  state.phase = 'playing';
  state.spinAngle = Math.random() * Math.PI * 2;
  state.posX = 0; state.posY = 0;
  state.igniteTime = 0;
  state.revealTime = 0;
  buildMarshmallow();
  marshmallow.rotation.y = state.spinAngle;
  marshGroup.position.set(REST_X, REST_Y, REST_Z);
  marshGroup.rotation.x = -Math.PI / 2;   // reset from any reveal-rotation

  clearFireParticles();
  $('fire-overlay').classList.add('hidden');

  $('score-readout').style.opacity = '1';
  $('joystick-zone').style.opacity = '1';
  $('rotate-zone').style.opacity = '1';
  $('finish-btn').style.opacity = '1';
  $('end-screen').classList.remove('fire-mode');

  input.rotate = 0;
  document.getElementById('rot-left-btn').classList.remove('active');
  document.getElementById('rot-right-btn').classList.remove('active');
}

function startReveal(score) {
  state.phase = 'reveal';
  state.revealTime = 0;
  state.finalScore = score;
  state.finalBand = bandFor(score);
  // Capture starting transform so we can ease to the final pose
  state.revealStartX = marshGroup.position.x;
  state.revealStartY = marshGroup.position.y;
  state.revealStartRotX = marshGroup.rotation.x;
  state.revealStartSpinY = marshmallow ? marshmallow.rotation.y : 0;
  $('joystick-zone').style.opacity = '0';
  $('rotate-zone').style.opacity = '0';
  $('finish-btn').style.opacity = '0';
  $('score-readout').style.opacity = '0';
}

function showFinalScreen() {
  state.phase = 'end';
  const bandEl = $('end-band');
  const scoreEl = $('end-score');
  const labelEl = $('end-result-label');
  const statEl = $('end-stat');
  const emojiEl = $('end-emoji');

  bandEl.className = '';
  scoreEl.className = '';

  const band = state.finalBand;
  bandEl.classList.add(band.cls);
  bandEl.textContent = band.label;
  emojiEl.textContent = band.emoji;
  scoreEl.textContent = Math.round(state.finalScore);
  labelEl.textContent = 'Round Complete';
  statEl.textContent = 'Average across surface';

  $('end-screen').classList.remove('hidden');
}

// Scoring bands with emoji
function bandFor(score) {
  if (score < 51)  return { label: "It's still cold!", emoji: '🥶', cls: 'b-cold' };
  if (score < 70)  return { label: "Uh, it's barely warm", emoji: '😳', cls: 'b-cool' };
  if (score < 85)  return { label: "Needs a little more", emoji: '🥉', cls: 'b-bronze' };
  if (score < 98)  return { label: "Nearly perfect", emoji: '🥈', cls: 'b-silver' };
  if (score < 103) return { label: "Perfect!", emoji: '🥇', cls: 'b-perfect' };
  if (score < 111) return { label: "Almost perfect", emoji: '🥈', cls: 'b-silver' };
  if (score < 131) return { label: "Uh, that's crispy", emoji: '🥉', cls: 'b-bronze' };
  if (score < 151) return { label: "Too burned!", emoji: '😬', cls: 'b-burned' };
  return { label: "NO THANKS!", emoji: '🤮', cls: 'b-yuck' };
}

// New score function: each vertex contributes its closeness to "perfect" (100),
// not its raw doneness. So a vertex at 100 scores 100, a vertex at 50 OR 150
// scores 65, a vertex at 0 OR 200 scores 30. Mean over all cookable vertices.
//
// This punishes uneven cooking: burning one side to 200 and leaving the other
// raw gives ~30 average instead of the misleading 100 a plain mean would give.
function vertexScore(doneness) {
  const dist = Math.abs(doneness - 100);
  return Math.max(0, 100 - 0.7 * dist);
}

function calcAvg() {
  const arr = donenessAttr.array;
  let sum = 0;
  let count = 0;
  for (let i = 0; i < vertexCount; i++) {
    if (cookableArr[i] > 0.5) {
      sum += vertexScore(arr[i]);
      count++;
    }
  }
  return count > 0 ? sum / count : 0;
}

$('finish-btn').addEventListener('click', () => {
  if (state.phase !== 'playing') return;
  startReveal(calcAvg());
});

$('blow-btn').addEventListener('click', () => {
  if (state.phase !== 'on-fire') return;
  // Raise the ignite threshold for every cookable vertex by 20 above its current
  // doneness — but only where this would be an INCREASE (so cold vertices stay at
  // their original 150 threshold).
  // This gives the player a 20-point grace window across the whole "hot zone",
  // not just the patch that was actively burning. Otherwise a vertex sitting at
  // 149 would re-ignite the next frame.
  const arr = donenessAttr.array;
  for (let i = 0; i < vertexCount; i++) {
    if (cookableArr[i] < 0.5) continue;
    const newThreshold = arr[i] + 20;
    if (newThreshold > igniteThresholds[i]) {
      igniteThresholds[i] = newThreshold;
    }
  }
  // Clear all particles
  clearFireParticles();

  // Resume play
  $('fire-overlay').classList.add('hidden');
  $('joystick-zone').style.opacity = '1';
  $('rotate-zone').style.opacity = '1';
  $('finish-btn').style.opacity = '1';
  state.phase = 'playing';
});

// ============================================================
// HEAT SIM
// ============================================================
const _v = new THREE.Vector3();
const _n = new THREE.Vector3();
const _toFlame = new THREE.Vector3();
const _normalMat = new THREE.Matrix3();

function applyHeat(dt) {
  if (!marshmallow) return { ignited: false, avg: 0, burningPositions: [] };
  marshmallow.material.uniforms.uTime.value += dt;

  const posAttr = marshGeom.attributes.position;
  const normAttr = marshGeom.attributes.normal;
  const arr = donenessAttr.array;
  marshmallow.updateMatrixWorld();
  const m = marshmallow.matrixWorld;
  _normalMat.getNormalMatrix(m);

  let ignited = false;
  let sum = 0;
  let count = 0;
  const burningPositions = [];

  for (let i = 0; i < vertexCount; i++) {
    if (cookableArr[i] < 0.5) continue;

    _v.set(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)).applyMatrix4(m);
    _n.set(normAttr.getX(i), normAttr.getY(i), normAttr.getZ(i)).applyMatrix3(_normalMat).normalize();

    _toFlame.subVectors(FLAME_POS, _v);
    const dist = _toFlame.length();
    _toFlame.normalize();

    const facing = Math.max(0, _n.dot(_toFlame));
    const distFactor = 1.0 / (1.0 + dist * dist * 0.55);

    let heat = CONFIG.HEAT_RATE * facing * distFactor;
    heat *= (0.9 + Math.random() * 0.2);

    arr[i] += heat * dt;
    sum += vertexScore(arr[i]);
    count++;
    // Vertex is "burning" iff its current doneness has crossed its own threshold.
    // After a successful blow-out, the threshold is bumped up by 20 from current doneness,
    // so the player gets a 20-point grace window before that area can re-ignite.
    if (arr[i] >= igniteThresholds[i]) {
      ignited = true;
      if (Math.random() < 0.15) {
        burningPositions.push(_v.x, _v.y, _v.z);
      }
    }
  }
  donenessAttr.needsUpdate = true;

  return { ignited, avg: count > 0 ? sum / count : 0, burningPositions };
}

// ============================================================
// MAIN LOOP
// ============================================================
function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, (t - state.lastTime) / 1000 || 0.016);
  state.lastTime = t;

  const flicker = 0.85 + Math.sin(t * 0.006) * 0.1 + Math.random() * 0.08;
  $('fire-glow-outer').style.opacity = flicker;
  $('fire-glow-inner').style.opacity = 0.7 + Math.sin(t * 0.011) * 0.15 + Math.random() * 0.1;
  const sway = Math.sin(t * 0.003) * 4;
  $('fire-glow-inner').style.transform = `translateX(${sway}px)`;
  fireLight.intensity = 5.0 + Math.sin(t * 0.008) * 0.5 + Math.random() * 0.4;

  if (state.phase === 'playing') {
    // Joystick controls position relative to REST
    // X: left/right slide
    // Y: up/down (joystick up = lift mallow up away from fire; joystick down = lower toward fire)
    const targetX = REST_X + input.joy.x * CONFIG.MOVE_X_RANGE;
    const targetY = REST_Y - input.joy.y * CONFIG.MOVE_Y_RANGE;
    state.posX += (targetX - state.posX) * CONFIG.MOVE_SMOOTH;
    state.posY += (targetY - state.posY) * CONFIG.MOVE_SMOOTH;
    marshGroup.position.x = state.posX;
    marshGroup.position.y = state.posY;

    if (input.rotate !== 0) {
      state.spinAngle += CONFIG.ROTATE_SPEED * dt * input.rotate;
    }
    if (marshmallow) marshmallow.rotation.y = state.spinAngle;

    const result = applyHeat(dt);
    const score = result.avg;
    const scoreEl = $('score-num');
    scoreEl.textContent = Math.round(score);
    if (score > 130) scoreEl.classList.add('danger');
    else scoreEl.classList.remove('danger');

    if (result.ignited && state.phase === 'playing') {
      state.phase = 'on-fire';
      $('joystick-zone').style.opacity = '0';
      $('rotate-zone').style.opacity = '0';
      $('finish-btn').style.opacity = '0';
      $('fire-overlay').classList.remove('hidden');
    }

    // Continuously emit particles from burning vertices (in playing AND on-fire phases)
    if (result.burningPositions.length > 0) {
      // Spawn a few particles per frame from random burning positions
      const burnCount = result.burningPositions.length / 3;
      const spawnsThisFrame = Math.min(8, Math.max(2, Math.floor(burnCount * 0.5)));
      for (let s = 0; s < spawnsThisFrame; s++) {
        const idx = Math.floor(Math.random() * burnCount);
        spawnFireParticle(
          result.burningPositions[idx*3],
          result.burningPositions[idx*3 + 1],
          result.burningPositions[idx*3 + 2]
        );
      }
    }
  } else if (state.phase === 'on-fire') {
    // While on fire, marshmallow keeps cooking (and growing the fire) until player taps blow-out
    const result = applyHeat(dt);
    // Continue spawning fire particles
    if (result.burningPositions.length > 0) {
      const burnCount = result.burningPositions.length / 3;
      const spawnsThisFrame = Math.min(10, Math.max(3, Math.floor(burnCount * 0.6)));
      for (let s = 0; s < spawnsThisFrame; s++) {
        const idx = Math.floor(Math.random() * burnCount);
        spawnFireParticle(
          result.burningPositions[idx*3],
          result.burningPositions[idx*3 + 1],
          result.burningPositions[idx*3 + 2]
        );
      }
    }
  } else if (state.phase === 'reveal') {
    state.revealTime += dt;
    // Ease from start pose (wherever the marshmallow was when player tapped Finish)
    // to final pose (vertical, left side of frame). Cubic ease-out.
    const t = Math.min(1, state.revealTime / CONFIG.REVEAL_DURATION);
    const e = 1 - Math.pow(1 - t, 3);

    // Targets: skewer pointing UP (vertical) means rotation.x goes from -π/2 to -π
    const targetRotX = -Math.PI;
    const targetX = -1.6;     // left side of frame in world units
    const targetY = REST_Y;   // stay at same vertical position

    marshGroup.rotation.x = state.revealStartRotX + (targetRotX - state.revealStartRotX) * e;
    marshGroup.position.x = state.revealStartX + (targetX - state.revealStartX) * e;
    marshGroup.position.y = state.revealStartY + (targetY - state.revealStartY) * e;

    // Stop the live spin during reveal — keep at whatever angle it was
    if (marshmallow) marshmallow.rotation.y = state.revealStartSpinY;

    if (state.revealTime >= CONFIG.REVEAL_DURATION) {
      showFinalScreen();
    }
  }

  // Always update fire particles. Each sprite manages its own visibility.
  updateFireParticles(dt);

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

$('start-btn').addEventListener('click', () => {
  $('title-screen').classList.add('hidden');
  startGame();
});
$('restart-btn').addEventListener('click', () => {
  $('end-screen').classList.add('hidden');
  startGame();
});

$('score-readout').style.opacity = '0';
$('joystick-zone').style.opacity = '0';
$('rotate-zone').style.opacity = '0';
$('finish-btn').style.opacity = '0';
['score-readout', 'joystick-zone', 'rotate-zone', 'finish-btn'].forEach(id => {
  $(id).style.transition = 'opacity 0.5s';
});

buildMarshmallow();
animate(0);
</script>
</body>
</html>
